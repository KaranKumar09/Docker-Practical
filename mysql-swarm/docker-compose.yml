# docker-compose.yml
version: '3.8'

services:
  mysql:
    image: custom-mysql-swarm
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  mysql-data:
    external: true
